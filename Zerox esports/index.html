<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Zerox eSports</title>
  <!-- Anime-style Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="./logo.png" />
  <!-- Preconnect for Video Providers -->
  <link rel="preconnect" href="https://drive.google.com">
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="dns-prefetch" href="https://drive.google.com">

  <!-- Uropay Production SDK -->
  <script src="https://cdn.uropay.me/uropay-embed.min.js"></script>

  <style>
    html, body {
      height: 100%;
      background-color: #0a0a0c;
      color: #ffffff;
      /* CRITICAL: Disables iOS rubber-band bounce + Android overscroll glow.
         Without this, lifting finger causes viewport resize → fixed bg zooms. */
      overscroll-behavior: none;
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: auto;
    }

    #root {
      isolation: isolate;
    }

    /* Custom Scrollbar only for desktops with cursors */
    @media (pointer: fine) {
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-track {
        background: #050505;
      }

      ::-webkit-scrollbar-thumb {
        background: #4c1d95;
        border-radius: 3px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #d946ef;
      }
    }

    .text-glow {
      text-shadow: 0 0 10px rgba(255, 59, 48, 0.5);
      /* Red glow matching primary */
    }

    .glass-panel {
      background: rgba(15, 15, 17, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
    "firebase/analytics": "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
